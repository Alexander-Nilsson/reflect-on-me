name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  pipeline:
    name: Lint, Test, Build, and Release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python 3.13
        run: |
          uv python install 3.13
          uv python pin 3.13
          rm -rf .venv

      - name: Install System Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            xvfb \
            libegl1 libgl1 \
            libxkbcommon0 libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-xinerama0 libxcb-icccm4 libxcb-keysyms1 \
            libnss3 libnspr4 \
            libfontconfig1 libdbus-1-3 \
            libxcomposite1 libxdamage1 libxrandr2 libxtst6 \
            libxfixes3 libxrender1 libxi6 libxcursor1 \
            libxxf86vm1 libxss1 \
            libasound2t64 libpulse0 libpulse-mainloop-glib0

      - name: Install Python Dependencies
        run: |
          uv venv --seed
          uv sync --frozen --no-dev --no-cache
          .venv/bin/pip install \
            "pytest>=8.4.1" "pytest-cov>=6.1.1" \
            "ruff>=0.11.0" \
            pyright

      - name: Install anki/aqt for integration tests
        run: |
          .venv/bin/pip install \
            https://files.pythonhosted.org/packages/2b/bc/36972ebb0c09effa41a1dc5f1e9c19b9fd85675cc3196f43559eeb3d0ceb/anki-25.9.4-cp39-abi3-manylinux_2_36_x86_64.whl \
            https://files.pythonhosted.org/packages/83/a1/a8e8c5bc7dda44c0decfdeb128ca308d65d7beca1a4131230e9abadef439/aqt-25.9.4-py3-none-any.whl

      - name: Lint
        run: |
          .venv/bin/ruff check reflectOnMee.py tests/

      - name: Type Check
        run: |
          .venv/bin/pyright reflectOnMee.py

      - name: Test
        run: |
          .venv/bin/pytest tests/ \
            -m "not integration" \
            --tb=short -v
          .venv/bin/pytest tests/test_addon_smoke.py \
            -m integration \
            --tb=short -v

      - name: Build
        run: .venv/bin/python build.py all

      - name: Bump Version, Build, Commit, and Tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        id: build_step
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          .venv/bin/python scripts/release.py --push

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build_step.outputs.tag }}
          name: Release ${{ steps.build_step.outputs.tag }}
          files: build/*.ankiaddon
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
